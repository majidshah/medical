name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR to save Actions minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Format check (black)
        run: black --check app tests

      - name: Run tests
        run: python -m pytest tests -v
        env:
          # CI-only dummy values so config loads. Never real secrets.
          # Real secrets live in GitHub repo settings -> Secrets, referenced by name.
          DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/ci_db
          JWT_SECRET_KEY: ci-dummy-secret-not-used-in-production
          DEBUG: "true"

  # Frontend job — uncomment and adjust when slice with the React app lands.
